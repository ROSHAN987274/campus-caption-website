<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<link rel="stylesheet" href="forget.css">

<!-- Font Awesome icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<form id="resetForm">

<h1>🔑 Reset Password</h1>

<label for="username">Enter your Username</label>
<input type="text" id="username" placeholder="Enter your username" required>

<label for="newpass">New Password</label>

<div class="password-box">
<input type="password" id="newpass" placeholder="Enter new password" required>
<i class="fa-solid fa-eye toggle-password" onclick="togglePassword('newpass',this)"></i>
</div>

<label for="confirmpass">Confirm Password</label>

<div class="password-box">
<input type="password" id="confirmpass" placeholder="Confirm password" required>
<i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirmpass',this)"></i>
</div>

<p id="msg"></p>

<button type="submit">Reset Password</button>

<p>Back to <a href="index.html">Login</a></p>

</form>

<script src="forget.js"></script>

</body>
</html>
